brain:
  num_neurons: 302
  num_sensory_neurons: 60
  num_motor_neurons: 94
  num_interneurons: 148
  num_light_sensors: 30
  num_vibration_sensors: 30
  dynamics:
    dt: 0.1
    state_decay: 1.0
    tau_init: 0.1
    sensory_scale_init: 0.1
    chemical_synapse_init_std: 0.01
    gap_junction_init_std: 0.01
  action:
    grip_actions: 2
    head_grip_index: 0
    tail_grip_index: 1
    segments: 46
    controls_per_segment: 2
    continuous_action_std: 0.15

worm:
  segments: 46
  initial_position: [400.0, 400.0]
  segment_length: 10.0
  segment_width: 5.0
  movement_scale: 8.0
  turn_scale: 0.35

environment:
  world_size: [800.0, 800.0]
  food_position: [620.0, 400.0]
  randomize_food: false
  food_radius: 18.0
  food_reward: 10.0
  progress_reward_scale: 4.0
  step_penalty: 0.01
  control_penalty: 0.01
  grip_penalty: 0.005
  wall_penalty: 0.2
  light_distance_scale: 260.0
  vibration_distance_scale: 120.0

training:
  seed: 7
  episodes: 200
  max_steps_per_episode: 200
  gamma: 0.97
  learning_rate: 0.001
  value_loss_weight: 0.5
  entropy_weight: 0.001
  grad_clip_norm: 1.0
  log_every: 10
